<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio - Loïc Brayane</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root{
  --bg:#0a1628;
  --card:#0f1f3d;
  --blue:#1a56db;
  --accent:#60a5fa;
  --text:#f0f4ff;
  --muted:#8ca0c0;
  --border:rgba(96,165,250,0.15);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:DM Sans;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(10,22,40,0.9);
  backdrop-filter:blur(10px);
  padding:1rem;
  z-index:100;
}

.nav-links{
  display:flex;
  justify-content:center;
  gap:1.5rem;
}

.nav-links a{
  color:var(--muted);
  text-decoration:none;
}

.nav-links a:hover{
  color:var(--accent);
}

/* SECTIONS */
section{
  padding:6rem 1.5rem;
  max-width:900px;
  margin:auto;
}

/* HERO */
.hero{
  text-align:center;
}

.profile{
  width:160px;
  height:160px;
  border-radius:50%;
  border:3px solid var(--accent);
  margin:auto;
  overflow:hidden;
  cursor:pointer;
  background:var(--card);
}

.profile img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TITRES */
h1{
  font-size:2.5rem;
  margin-top:1rem;
}

h1 span{
  color:var(--accent);
}

/* COMPÉTENCES */
.skills{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:1rem;
}

.skill{
  background:var(--card);
  padding:1rem;
  border-radius:10px;
}

.bar{
  height:6px;
  background:#1a2a44;
  border-radius:10px;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,var(--blue),var(--accent));
}

/* PROJETS */
.projects{
  display:grid;
  gap:1rem;
}

.card{
  background:var(--card);
  padding:1rem;
  border-radius:10px;
}

button{
  width:100%;
  padding:1rem;
  margin-top:1rem;
  background:none;
  border:2px dashed var(--accent);
  color:var(--text);
  cursor:pointer;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:var(--card);
  padding:2rem;
  border-radius:10px;
  width:90%;
  max-width:400px;
}

input,textarea{
  width:100%;
  margin:0.5rem 0;
  padding:0.8rem;
  background:var(--bg);
  border:1px solid var(--border);
  color:white;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="nav-links">
    <a href="#accueil">Accueil</a>
    <a href="#apropos">À propos</a>
    <a href="#competences">Compétences</a>
    <a href="#projets">Projets</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO -->
<section id="accueil" class="hero">

  <div class="profile" id="profile">
    <input type="file" id="file" hidden>
  </div>

  <p style="color:var(--muted)">Salut, je suis</p>

  <h1>
    Loïc Brayane <br>
    <span>Développeur Web</span>
  </h1>

  <p>Étudiant en Génie Informatique</p>

</section>

<!-- COMPÉTENCES -->
<section id="competences">
<h2>Compétences</h2>

<div class="skills">

<div class="skill">
<h4><i class="fa-brands fa-html5"></i> HTML/CSS</h4>
<div class="bar"><div class="fill" style="width:80%"></div></div>
</div>

<div class="skill">
<h4><i class="fa-brands fa-js"></i> JavaScript</h4>
<div class="bar"><div class="fill" style="width:55%"></div></div>
</div>

<div class="skill">
<h4><i class="fa-solid fa-palette"></i> UI/UX</h4>
<div class="bar"><div class="fill" style="width:60%"></div></div>
</div>

<div class="skill">
<h4><i class="fa-solid fa-database"></i> Base de données</h4>
<div class="bar"><div class="fill" style="width:45%"></div></div>
</div>

</div>
</section>

<!-- PROJETS -->
<section id="projets">

<h2>Projets</h2>

<div class="projects" id="projects"></div>

<button onclick="openModal()">+ Ajouter un projet</button>

</section>

<!-- CONTACT -->
<section id="contact">
<h2>Contact</h2>
<p>📱 +237 681 591 969</p>
<p>✉️ tonemail@gmail.com</p>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<input id="title" placeholder="Titre">
<input id="tags" placeholder="Tags">
<textarea id="desc" placeholder="Description"></textarea>

<button onclick="addProject()">Ajouter</button>
<button onclick="closeModal()">Annuler</button>

</div>
</div>

<script>

/* PROFILE */
document.getElementById("profile").onclick = () =>
document.getElementById("file").click();

document.getElementById("file").onchange = e => {
const reader = new FileReader();
reader.onload = ev => {
localStorage.setItem("profile", ev.target.result);
loadProfile();
};
reader.readAsDataURL(e.target.files[0]);
};

function loadProfile(){
const img = localStorage.getItem("profile");
if(img){
document.getElementById("profile").innerHTML =
`<img src="${img}">`;
}
}

/* PROJECTS */
function addProject(){

const t = title.value;
const tg = tags.value;
const d = desc.value;

if(!t || !d) return;

let data = JSON.parse(localStorage.getItem("projects")) || [];

data.push({t,tg,d});

localStorage.setItem("projects",JSON.stringify(data));

render();
closeModal();
}

function render(){

let data = JSON.parse(localStorage.getItem("projects")) || [];

projects.innerHTML = "";

data.forEach(p=>{
projects.innerHTML += `
<div class="card">
<h3>${p.t}</h3>
<p>${p.tg}</p>
<p>${p.d}</p>
</div>
`;
});
}

function openModal(){
modal.style.display="flex";
}

function closeModal(){
modal.style.display="none";
}

loadProfile();
render();

</script>

</body>
</html>
