<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loïc Brayane | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: white;
            overflow-x: hidden;
        }
        h1, h2, h3, .logo, .nav-links a, .btn {
            font-family: 'Orbitron', monospace;
        }
        
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
            position: relative;
        }
        .logo::after {
            content: "⚡ admin";
            position: absolute;
            bottom: -20px;
            left: 0;
            font-size: 0.6rem;
            color: #c084fc;
            opacity: 0;
            transition: opacity 0.3s;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }
        .logo:hover::after {
            opacity: 0.6;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        .nav-links a {
            color: #ccc;
            text-decoration: none;
            transition: 0.3s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #c084fc;
        }
        .menu-icon {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
        }
        section {
            min-height: 100vh;
            padding: 100px 5% 80px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .hero-content {
            text-align: center;
            margin-top: 10vh;
        }
        .profile-img {
            width: 150px;
            height: 150px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #c084fc, #ec4899);
            padding: 3px;
            cursor: pointer;
        }
        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #c084fc, #ec4899, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        #typed-text {
            font-size: 1.2rem;
            color: #c084fc;
            border-right: 2px solid #c084fc;
            display: inline-block;
        }
        .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #7c3aed, #db2777);
            border-radius: 2rem;
            color: white;
            text-decoration: none;
            margin: 1rem;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #a855f7;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        h2 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #c084fc, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .skills-grid, .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
        }
        .skill-card, .project-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            transition: 0.3s;
        }
        .skill-card:hover, .project-card:hover {
            transform: translateY(-5px);
            border-color: #c084fc;
        }
        .skill-card i {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .project-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        .info-card, .form-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 1rem;
            padding: 1.5rem;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .info-item i {
            font-size: 1.2rem;
            color: #c084fc;
        }
        input, textarea {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 0.5rem;
            color: white;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #c084fc;
        }
        
        .admin-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            background: #1a1a1a;
            border: 2px solid #c084fc;
            border-radius: 1rem;
            padding: 1.5rem;
            z-index: 2000;
        }
        .admin-panel h3 {
            margin-bottom: 1rem;
            text-align: center;
        }
        .close-admin {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
        }
        #admin-projects-list {
            margin-top: 1rem;
            max-height: 200px;
            overflow-y: auto;
        }
        #admin-projects-list div {
            background: #2a2a2a;
            margin: 0.5rem 0;
            padding: 0.5rem;
            border-radius: 0.5rem;
            display: flex;
            justify-content: space-between;
        }
        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .nav-links.open { display: flex; flex-direction: column; position: absolute; top: 60px; right: 20px; background: #1a1a1a; padding: 1rem; border-radius: 0.5rem; }
            .menu-icon { display: block; }
            .contact-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2rem; }
        }
        
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div id="admin-panel" class="admin-panel">
        <span class="close-admin" id="close-admin">&times;</span>
        <h3><i class="fas fa-lock"></i> Admin - Gestion des projets</h3>
        <input type="text" id="proj-name" placeholder="Nom du projet" required>
        <input type="text" id="proj-type" placeholder="Type (ex: Web, IA...)" required>
        <textarea id="proj-desc" placeholder="Description" rows="2" required></textarea>
        <input type="text" id="proj-img" placeholder="URL de l'image (optionnel)">
        <input type="text" id="proj-link" placeholder="Lien du projet (optionnel)">
        <button id="add-project-btn" class="btn" style="width:100%">Ajouter le projet</button>
        <button id="cancel-edit" class="btn-outline" style="width:100%; margin-top:0.5rem; display:none;">Annuler l'édition</button>
        <div id="admin-projects-list"></div>
        <p id="admin-msg" style="margin-top:0.5rem; font-size:0.8rem; text-align:center;"></p>
    </div>

    <nav class="navbar">
        <div class="logo" id="secret-logo">LBY</div>
        <div class="menu-icon" id="menu-icon"><i class="fas fa-bars"></i></div>
        <div class="nav-links" id="nav-links">
            <a href="#hero">Accueil</a>
            <a href="#university">Université</a>
            <a href="#skills">Compétences</a>
            <a href="#about">À propos</a>
            <a href="#projects">Projets</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <section id="hero">
        <div class="container">
            <div class="hero-content">
                <div class="profile-img" id="profile-click">
                    <img src="https://i.ibb.co/p6m5zrpc/image-aac7e0a5.png" alt="Photo de profil" id="profile-pic">
                </div>
                <h1>Loïc Brayane</h1>
                <div style="margin: 1rem 0;"><span id="typed-text"></span></div>
                <a href="#contact" class="btn">Me contacter</a>
                <a href="#projects" class="btn btn-outline">Voir projets</a>
            </div>
        </div>
    </section>

    <section id="university">
        <div class="container">
            <h2>Université</h2>
            <div style="background: rgba(255,255,255,0.05); border-radius: 1rem; padding: 2rem; text-align: center;">
                <i class="fas fa-university" style="font-size: 3rem; color: #c084fc;"></i>
                <h3 style="margin: 1rem 0;">IUT DE DOUALA</h3>
                <p>Département Informatique - BUT Informatique</p>
                <p>2024 - 2027</p>
            </div>
        </div>
    </section>

    <section id="skills">
        <div class="container">
