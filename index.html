<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root{
  --navy:#0a1628;
  --navy2:#0f1f3d;
  --blue:#1a56db;
  --accent:#60a5fa;
  --white:#f0f4ff;
  --muted:#8ca0c0;
}

body{
  margin:0;
  font-family:'DM Sans';
  background:var(--navy);
  color:var(--white);
}

nav{
  position:fixed;
  top:0;left:0;right:0;
  background:rgba(10,22,40,0.9);
  padding:1rem;
  text-align:center;
}

section{
  max-width:900px;
  margin:auto;
  padding:5rem 1.5rem;
}

.hero{
  text-align:center;
}

.profile{
  width:150px;
  height:150px;
  border-radius:50%;
  border:3px solid var(--accent);
  margin:auto;
  overflow:hidden;
  cursor:pointer;
}

.profile img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.skills{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1rem;
}

.skill{
  background:var(--navy2);
  padding:1rem;
  border-radius:10px;
}

.bar{
  height:6px;
  background:#1a2a44;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,var(--blue),var(--accent));
}

.projects{
  display:grid;
  gap:1rem;
}

.card{
  background:var(--navy2);
  padding:1rem;
  border-radius:10px;
}

button{
  padding:1rem;
  width:100%;
  background:none;
  border:2px dashed var(--accent);
  color:var(--white);
  cursor:pointer;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:var(--navy2);
  padding:2rem;
  border-radius:10px;
  width:90%;
  max-width:400px;
}

input,textarea{
  width:100%;
  margin:0.5rem 0;
  padding:0.8rem;
  border:none;
  background:var(--navy);
  color:white;
}
</style>
</head>

<body>

<nav>Mon Portfolio</nav>

<section class="hero">

<div class="profile" id="profile">
<input type="file" id="file" hidden>
</div>

<h1>Loïc Brayane</h1>
<p>Développeur Web & UI/UX Designer</p>
<p>Étudiant en Génie Informatique</p>

<p>Création de solutions web modernes et performantes.</p>

</section>

<section>
<h2>Compétences</h2>

<div class="skills">

<div class="skill">
<h4><i class="fa-brands fa-html5"></i> HTML/CSS</h4>
<div class="bar"><div class="fill" style="width:80%"></div></div>
</div>

<div class="skill">
<h4><i class="fa-brands fa-js"></i> JavaScript</h4>
<div class="bar"><div class="fill" style="width:55%"></div></div>
</div>

<div class="skill">
<h4><i class="fa-solid fa-palette"></i> UI/UX</h4>
<div class="bar"><div class="fill" style="width:60%"></div></div>
</div>

<div class="skill">
<h4><i class="fa-brands fa-figma"></i> Figma</h4>
<div class="bar"><div class="fill" style="width:65%"></div></div>
</div>

</div>
</section>

<section>
<h2>Projets</h2>

<div class="projects" id="projects"></div>

<button onclick="openModal()">+ Ajouter un projet</button>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<input id="title" placeholder="Titre">
<input id="tags" placeholder="Tags">
<textarea id="desc" placeholder="Description"></textarea>
<button onclick="addProject()">Ajouter</button>
<button onclick="closeModal()">Annuler</button>
</div>
</div>

<script>

// PROFILE IMAGE
document.getElementById("profile").onclick = () => {
document.getElementById("file").click();
};

document.getElementById("file").onchange = e => {
const reader = new FileReader();
reader.onload = ev => {
localStorage.setItem("profile", ev.target.result);
loadProfile();
};
reader.readAsDataURL(e.target.files[0]);
};

function loadProfile(){
const img = localStorage.getItem("profile");
if(img){
document.getElementById("profile").innerHTML =
`<img src="${img}">`;
}
}

// PROJECTS
function addProject(){

const t = title.value;
const tg = tags.value;
const d = desc.value;

if(!t || !d) return;

let data = JSON.parse(localStorage.getItem("projects")) || [];

data.push({t,tg,d});

localStorage.setItem("projects",JSON.stringify(data));

render();

closeModal();
}

function render(){

let data = JSON.parse(localStorage.getItem("projects")) || [];

projects.innerHTML = "";

data.forEach(p=>{
projects.innerHTML += `
<div class="card">
<h3>${p.t}</h3>
<p>${p.tg}</p>
<p>${p.d}</p>
</div>
`;
});
}

function openModal(){
modal.style.display="flex";
}

function closeModal(){
modal.style.display="none";
}

loadProfile();
render();

</script>

</body>
</html>
